<p>打开命令行：</p>
<figure class="highlight cmd"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line"><span class="built_in">convert</span> X: /<span class="built_in">fs</span>:ntfs /x</span><br><span class="line"># X U盘的盘名</span><br></pre></td></tr></table></figure>
